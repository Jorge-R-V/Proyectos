{% extends "base.html" %}

{% block title %}Eliminar Película - CineMax{% endblock %}

{% block content %}
<div class="h-full flex items-center justify-center min-h-[50vh]">
    <div class="bg-white p-8 md:p-12 rounded-2xl max-w-md w-full text-center border border-gray-200 shadow-md relative overflow-hidden">
        
        <div class="w-16 h-16 bg-red-50 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl border border-red-100">
            <i class="fa-solid fa-trash-can"></i>
        </div>
        
        <h2 class="text-2xl font-bold text-gray-900 mb-2">¿Eliminar película?</h2>
        <p class="text-gray-600 mb-8 leading-relaxed">
            Estás a punto de eliminar <span class="font-bold text-gray-900">"{{ peli.titulo }}"</span> de forma permanente. Esta acción no se puede deshacer.
        </p>

        <form method="POST" class="flex flex-col sm:flex-row gap-3 justify-center">
            <a href="{{ url_for('read_peliculas') }}" class="px-6 py-2.5 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors flex-1 font-medium">
                Cancelar
            </a>
            <button type="submit" class="px-6 py-2.5 rounded-lg bg-red-600 hover:bg-red-700 text-white font-semibold transition-colors flex-1 shadow-sm">
                Eliminar ahora
            </button>
        </form>
    </div>
</div>
{% endblock %}
