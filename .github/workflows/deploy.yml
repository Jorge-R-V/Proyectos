name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build pruebasDiseño
        working-directory: ./pruebasDiseño
        run: |
          npm install
          npm run build

      - name: Build proyectoGestorCalorias
        working-directory: ./proyectoGestorCalorias
        run: |
          npm install
          npm run build

      - name: Prepare deployment directory
        run: |
          mkdir _site
          
          # Copy simulador-energia
          mkdir _site/simulador-energia
          cp -r simulador-energia/* _site/simulador-energia/
          
          # Copy pruebasDiseño (the Vite build output)
          mkdir _site/pruebasDiseño
          cp -r pruebasDiseño/dist/* _site/pruebasDiseño/
          
          # Copy proyectoGestorCalorias
          mkdir _site/proyectoGestorCalorias
          cp -r proyectoGestorCalorias/dist/* _site/proyectoGestorCalorias/
          
          # Copy ProyectoGabineteAbogados
          mkdir _site/ProyectoGabineteAbogados
          cp -r ProyectoGabineteAbogados/* _site/ProyectoGabineteAbogados/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
