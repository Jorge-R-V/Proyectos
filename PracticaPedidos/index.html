<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Propinas y Consumos</title>
    <link rel="stylesheet" href="css/bootstrap.min.css">
    <link rel="stylesheet" href="css/estilo.css">
</head>
<body>
    <header class="header-principal">
        <h1>Calculadora de Consumos y Propinas</h1>
    </header>

    <main class="container contenido-principal">
        <div class="row">
            <div class="col-md-6">
                <div class="contenedor-nueva-orden">
                    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#formulario">
                        Nueva Orden
                    </button>
                </div>

                <div id="platillos" class="seccion-platillos d-none">
                    <h2>Platillos</h2>
                    <div class="contenido"></div>
                </div>
            </div>
            <div class="col-md-6">
                <div id="resumen" class="d-none">
                    <h2>Resumen de Consumo</h2>
                    <div class="contenido"></div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="formulario" tabindex="-1" aria-labelledby="exampleModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Información de la Orden</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form>
                        <div class="mb-3">
                            <label class="form-label">Mesa</label>
                            <input id="mesa" type="number" class="form-control" min="1">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Hora</label>
                            <input id="hora" type="time" class="form-control">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" id="guardar-cliente" class="btn btn-primary">Guardar Cambios</button>
                </div>
            </div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
